---
layout: default
---
<style>
  .post-header { margin-bottom: 32px; padding-top: 20px; }
  .post-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .post-meta { font-size: 14px; color: var(--text-sub); }
  .post-content {
    max-width: 720px;
    line-height: 1.8; font-size: 16px;
  }
  .post-content h2 { font-size: 24px; font-weight: 700; margin: 40px 0 16px; }
  .post-content h3 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; }
  .post-content p { margin-bottom: 16px; }
  .post-content ul, .post-content ol { margin: 0 0 16px 24px; }
  .post-content li { margin-bottom: 6px; }
  .post-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 20px; margin: 16px 0;
    background: var(--surface); border-radius: 0 8px 8px 0;
    color: var(--text-sub); font-style: italic;
  }
  .post-content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }
  .post-content code { background: #f0ede6; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
  .post-back { display: inline-block; margin-top: 40px; color: var(--accent-dark); text-decoration: none; font-weight: 600; }
  .post-back:hover { text-decoration: underline; }
</style>

<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y년 %m월 %d일" }}</p>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="/words" class="post-back">← 글 목록으로</a>
</article>
