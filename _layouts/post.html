---
layout: default
---

<article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-24 md:py-32">
  <!-- Back link -->
  <a href="/breeze" class="reveal inline-flex items-center gap-2 text-sm text-sub hover:text-ink premium-hover mb-12">
    <iconify-icon icon="solar:arrow-left-linear" width="16"></iconify-icon>
    Breeze
  </a>

  <!-- Post header -->
  <header class="reveal mb-12">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-tight text-ink mb-4">
      {{ page.title }}
    </h1>
    <p class="text-sm text-sub">{{ page.date | date: "%Y년 %m월 %d일" }}</p>
  </header>

  <!-- Post content -->
  <div class="reveal prose-custom">
    {{ content }}
  </div>

  <!-- Back to list -->
  <div class="reveal mt-16 pt-8 border-t border-black/5">
    <a href="/breeze" class="inline-flex items-center gap-2 text-sm font-semibold text-sub hover:text-ink premium-hover">
      <iconify-icon icon="solar:arrow-left-linear" width="16"></iconify-icon>
      글 목록으로
    </a>
  </div>
</article>

<style>
  .prose-custom {
    font-size: 1rem;
    line-height: 1.8;
    color: #1C1C19;
    max-width: 65ch;
  }
  .prose-custom h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 2.5rem 0 1rem;
    letter-spacing: -0.02em;
  }
  .prose-custom h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin: 2rem 0 0.75rem;
  }
  .prose-custom p { margin-bottom: 1rem; }
  .prose-custom ul, .prose-custom ol { margin: 0 0 1rem 1.5rem; }
  .prose-custom li { margin-bottom: 0.375rem; }
  .prose-custom blockquote {
    border-left: 3px solid #7BA886;
    padding: 0.75rem 1.25rem;
    margin: 1rem 0;
    background: rgba(123, 168, 134, 0.06);
    border-radius: 0 0.75rem 0.75rem 0;
    color: #6B6860;
    font-style: italic;
  }
  .prose-custom img {
    max-width: 100%;
    border-radius: 1rem;
    margin: 1.5rem 0;
  }
  .prose-custom code {
    background: rgba(0,0,0,0.04);
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-size: 0.875rem;
  }
  .prose-custom pre {
    background: #1C1C19;
    color: #e0e0e0;
    padding: 1.25rem;
    border-radius: 1rem;
    overflow-x: auto;
    margin: 1.5rem 0;
  }
  .prose-custom pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  .prose-custom a {
    color: #5A8A6A;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .prose-custom a:hover { color: #7BA886; }
  .prose-custom hr {
    border: none;
    border-top: 1px solid rgba(0,0,0,0.08);
    margin: 2rem 0;
  }
</style>
