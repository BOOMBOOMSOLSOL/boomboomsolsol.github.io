---
layout: default
title: 홈
---
<style>
  .hero {
    text-align: center;
    padding: 80px 0 60px;
  }
  .hero h1 {
    font-size: 44px; font-weight: 800;
    line-height: 1.3; margin-bottom: 16px;
  }
  .hero h1 em { font-style: normal; color: var(--accent-dark); }
  .hero p {
    font-size: 18px; color: var(--text-sub);
    line-height: 1.6; margin-bottom: 48px;
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    margin-bottom: 60px;
  }
  .app-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: var(--text);
  }
  .app-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.08);
  }
  .app-icon {
    width: 80px; height: 80px;
    border-radius: 20px;
    margin: 0 auto 16px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .app-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .app-card p { font-size: 14px; color: var(--text-sub); line-height: 1.5; }
  .app-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 12px;
    background: var(--accent);
    color: #fff;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .about {
    text-align: center;
    padding: 40px 0;
    color: var(--text-sub);
    font-size: 15px;
    line-height: 1.8;
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 28px; }
    .hero p { font-size: 16px; }
  }
</style>

<section class="hero">
  <h1>더 나은 <em>학습 경험</em>을<br>만듭니다</h1>
  <p>붐붐솔솔은 교육 앱을 만드는 소프트웨어 스튜디오입니다.</p>
</section>

<section class="app-grid">
  <a href="/apps/vocabulary" class="app-card">
    <div class="app-icon">📚</div>
    <h3>국어:어휘의 신</h3>
    <p>초등부터 성인까지<br>10,000+ 단어로 국어 어휘력을 키우세요</p>
    <span class="app-badge">출시 예정</span>
  </a>

  <!-- 추후 앱 추가 시 아래에 카드만 복사 -->

  <a href="/apps/next-app" class="app-card">
    <div class="app-icon">🎯</div>
    <h3>다음 앱</h3>
    <p>설명</p>
    <span class="app-badge">개발 중</span>
  </a>
  -->
</section>

<section class="about">
  <p>
    <strong>붐붐솔솔</strong>은 학습이 즐거워지는 앱을 만듭니다.<br>
    문의: <a href="mailto:{{ site.company.email }}" style="color: var(--accent-dark);">{{ site.company.email }}</a>
  </p>
</section>
